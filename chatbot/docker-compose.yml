services:
  mongo:
    image: mongo:6
    restart: always
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/data/configdb/mongodb.key']
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
      - ./mongo-config/mongodb.key:/data/configdb/mongodb.key
    env_file:
      - .env.db.production
    healthcheck:
      test: >
        echo 'db.runCommand({ ping: 1 })' | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  mongo-init-replica:
    image: mongo:6
    depends_on:
      - mongo
    restart: 'no'
    entrypoint: >
      bash -c "
        sleep 5 &&
        mongosh --host mongo --eval '
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"mongo:27017\" }]
          })
        ' || true
      "

  app:
    build: .
    restart: always
    ports:
      - '8081:8081'
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.production

volumes:
  mongo-data:
